name: Dashboard-CI

defaults:
  run:
    working-directory: dashboard

on:
  push:
    branches:
      - 'main'
    paths:
      - 'dashboard/**'
  pull_request:
    paths:
      - 'dashboard/**'

jobs:
  packages:
    name: Install Packages
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: jdx/mise-action@v4
        with:
          install_args: node pnpm
      - run: pnpm install --frozen-lockfile
  rome:
    name: Format and Lint
    runs-on: ubuntu-latest
    needs: [packages]
    steps:
      - uses: actions/checkout@v6
      - uses: jdx/mise-action@v4
        with:
          install_args: node pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm run ci
  typecheck:
    name: Check types
    runs-on: ubuntu-latest
    needs: [packages]
    steps:
      - uses: actions/checkout@v6
      - uses: jdx/mise-action@v4
        with:
          install_args: node pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck
  test:
    name: Test
    runs-on: ubuntu-latest
    needs: [packages]
    steps:
      - uses: actions/checkout@v6
      - uses: jdx/mise-action@v4
        with:
          install_args: node pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm test
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [packages]
    steps:
      - uses: actions/checkout@v6
      - uses: jdx/mise-action@v4
        with:
          install_args: node pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
