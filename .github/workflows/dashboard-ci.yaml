name: Dashboard-CI

defaults:
  run:
    working-directory: dashboard

on:
  push:
    branches:
      - 'main'
    paths:
      - 'dashboard/**'
  pull_request:
    paths:
      - 'dashboard/**'

jobs:
  packages:
    name: Install Packages
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1
        with:
          install_args: node pnpm
      - run: pnpm install --frozen-lockfile
  rome:
    name: Format and Lint
    runs-on: ubuntu-latest
    needs: [packages]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1
        with:
          install_args: node pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm run ci
  typecheck:
    name: Check types
    runs-on: ubuntu-latest
    needs: [packages]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1
        with:
          install_args: node pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck
  test:
    name: Test
    runs-on: ubuntu-latest
    needs: [packages]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1
        with:
          install_args: node pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm test
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [packages]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1
        with:
          install_args: node pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
