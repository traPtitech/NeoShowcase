name: CI

on:
  push:
    branches:
      - 'main'
    paths-ignore:
      - 'dashboard/**'
      - 'docs/**'
      - 'README.md'
      - '.github/**'
      - '!.github/workflows/ci.yaml'
  pull_request:
    paths-ignore:
      - 'dashboard/**'
      - 'docs/**'
      - 'README.md'
      - '.github/**'
      - '!.github/workflows/ci.yaml'

jobs:
  mod:
    name: Modules
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: ./go.mod
      - run: go mod download

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [mod]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: ./go.mod
      - run: go build -o ns ./cmd

  lint:
    name: Lint
    runs-on: ubuntu-latest
    needs: [mod]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: ./go.mod
      - uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1
        with:
          install_args: golangci-lint
      - name: golangci-lint
        uses: golangci/golangci-lint-action@82606bf257cbaff209d206a39f5134f0cfbfd2ee # v9.2.1
        with:
          install-mode: "none"

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: [mod]
    strategy:
      matrix:
        race:
          - ''
          - -race
    env:
      ENABLE_DB_TESTS: 'true'
      ENABLE_DOCKER_TESTS: 'true'
      DOCKER_API_VERSION: '1.43'
    services:
      mysql:
        image: mysql:8
        options: --health-cmd="mysqladmin ping" --health-interval=5s --health-timeout=3s --health-retries=10
        env:
          MYSQL_ROOT_PASSWORD: password
          MYSQL_DATABASE: neoshowcase
        ports:
          - 5004:3306
      mongo:
        image: mongo
        env:
          MONGO_INITDB_ROOT_USERNAME: root
          MONGO_INITDB_ROOT_PASSWORD: password
        ports:
          - 5010:27017
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: ./go.mod
      - name: Run migration
        run: |
          go install github.com/sqldef/sqldef/cmd/mysqldef@latest
          DB_PORT=5004 ./migrations/entrypoint.sh ./migrations/schema.sql
      - name: Run tests
        run: go test ./... -v ${{ matrix.race }} -coverprofile=coverage.out -covermode=atomic -vet=off
      - name: Upload coverage to Codecov
        run: bash <(curl -s https://codecov.io/bash)
        if: matrix.race == ''

  k8s-test:
    name: K8s Test
    runs-on: ubuntu-latest
    needs: [mod]
    strategy:
      matrix:
        race:
          - ''
          - -race
    env:
      ENABLE_K8S_TESTS: 'true'
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: ./go.mod
      - name: Create single cluster
        uses: AbsaOSS/k3d-action@4e8b3239042be1dc0aed6c5eb80c13b18200fc79 # v2.4.0
        id: single-cluster
        with:
          cluster-name: 'test-cluster'
          k3d-version: v5.8.3
          args: >-
            --agents 1
            --no-lb
            --k3s-arg "--disable=traefik,servicelb,metrics-server@server:0"
      - name: Show cluster info
        run: |
          echo ${{ steps.single-cluster.outputs.network }}
          echo ${{ steps.single-cluster.outputs.subnet-CIDR }}
          docker ps -a
          kubectl cluster-info --context k3d-test-cluster
          kubectl config use-context k3d-test-cluster
          kubectl get nodes -o wide
      - name: Create namespace
        run: kubectl create ns neoshowcase-apps
      - name: Install CRDs
        run: |
          kubectl apply -f https://raw.githubusercontent.com/traefik/traefik/v3.0.0/docs/content/reference/dynamic-configuration/kubernetes-crd-definition-v1.yml
      - name: Run tests
        run: go test ./pkg/infrastructure/backend/k8simpl -v ${{ matrix.race }} -coverprofile=coverage.out -covermode=atomic -vet=off
      - name: Upload coverage to Codecov
        run: bash <(curl -s https://codecov.io/bash)
        if: matrix.race == ''

  tbls:
    name: TBLS
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mariadb:11.8
        options: --health-cmd="healthcheck.sh --connect --innodb_initialized" --health-interval=10s --health-timeout=2s --health-retries=5
        env:
          MYSQL_ROOT_PASSWORD: password
          MYSQL_DATABASE: neoshowcase
        ports:
          - 5004:3306
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: ./go.mod
      - name: Run migration
        run: |
          go install github.com/sqldef/sqldef/cmd/mysqldef@latest
          DB_PORT=5004 ./migrations/entrypoint.sh ./migrations/schema.sql
      - uses: k1low/setup-tbls@f25e3d013a596865b2db90dac7ee19e9f15b5780 # v1.4.0
        with:
          version: v1.65.3
      - run: tbls lint
        env:
          TBLS_DSN: 'mariadb://root:password@127.0.0.1:5004/neoshowcase'
